<!-- AI客服小助手 - 放到WordPress网站 -->
<!-- 使用方法：在WordPress后台添加自定义HTML或小工具 -->

<style>
.ai-chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.ai-chat-toggle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s;
}

.ai-chat-toggle:hover {
    transform: scale(1.1);
}

.ai-chat-toggle svg {
    width: 30px;
    height: 30px;
    fill: white;
}

.ai-chat-box {
    position: absolute;
    bottom: 80px;
    right: 0;
    width: 380px;
    height: 500px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    display: none;
    flex-direction: column;
    overflow: hidden;
}

.ai-chat-box.active {
    display: flex;
}

.ai-chat-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 16px 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
}

.ai-chat-header .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

.ai-chat-header .avatar svg {
    width: 24px;
    height: 24px;
    fill: #667eea;
}

.ai-chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #f8f9fa;
}

.ai-message {
    background: white;
    padding: 12px 16px;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    margin-bottom: 12px;
    max-width: 85%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    line-height: 1.5;
    font-size: 14px;
}

.user-message {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 12px;
    border-bottom-right-radius: 4px;
    margin-left: auto;
    margin-bottom: 12px;
    max-width: 85%;
    padding: 12px 16px;
    line-height: 1.5;
    font-size: 14px;
}

.ai-chat-input {
    padding: 16px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 10px;
    background: white;
}

.ai-chat-input input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 24px;
    outline: none;
    font-size: 14px;
    transition: border-color 0.3s;
}

.ai-chat-input input:focus {
    border-color: #667eea;
}

.ai-chat-input button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s;
}

.ai-chat-input button:hover {
    transform: scale(1.1);
}

.ai-chat-input button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: white;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    margin-bottom: 12px;
    width: fit-content;
}

.typing-indicator span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #667eea;
    animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
}

.typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes typing {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-5px); opacity: 1; }
}

@media (max-width: 480px) {
    .ai-chat-box {
        width: calc(100vw - 40px);
        height: calc(100vh - 150px);
        right: -10px;
    }
}
</style>

<div class="ai-chat-widget">
    <!-- 聊天窗口 -->
    <div class="ai-chat-box" id="aiChatBox">
        <div class="ai-chat-header">
            <div class="avatar">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <span>AI 客服小助手</span>
        </div>
        <div class="ai-chat-messages" id="aiMessages">
            <div class="ai-message">你好！我是AI客服，有什么可以帮你的吗？😊</div>
        </div>
        <div class="ai-chat-input">
            <input type="text" id="aiInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button id="aiSendBtn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
    
    <!-- 打开按钮 -->
    <div class="ai-chat-toggle" onclick="toggleChat()">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    </div>
</div>

<script>
const API_KEY = 'YOUR_API_KEY'; // 填入客户的API Key
const API_URL = 'https://api.deepseek.com/chat/completions'; // DeepSeek
// 支持的模型和API配置（客户自己选）
const MODELS = {
    'doubao-seed-2-0-pro-260215': {
        name: '豆包',
        url: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions'
    },
    'qwen-turbo': {
        name: '千问',
        url: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions'
    }
};
// 当前使用的模型（修改这里切换：doubao-seed-2-0-pro-260215 或 qwen-turbo）
const CURRENT_MODEL = 'doubao-seed-2-0-pro-260215';

let isChatOpen = false;
let isTyping = false;

function toggleChat() {
    isChatOpen = !isChatOpen;
    document.getElementById('aiChatBox').classList.toggle('active', isChatOpen);
}

function addMessage(content, isUser) {
    const messages = document.getElementById('aiMessages');
    const div = document.createElement('div');
    div.className = isUser ? 'user-message' : 'ai-message';
    div.textContent = content;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
    const messages = document.getElementById('aiMessages');
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
    const indicator = document.getElementById('typingIndicator');
    if (indicator) indicator.remove();
}

async function sendMessage() {
    const input = document.getElementById('aiInput');
    const btn = document.getElementById('aiSendBtn');
    const message = input.value.trim();
    
    if (!message || isTyping) return;
    
    // 显示用户消息
    addMessage(message, true);
    input.value = '';
    
    // 显示加载状态
    isTyping = true;
    btn.disabled = true;
    showTyping();
    
    try {
        // 获取当前模型配置
        const modelConfig = MODELS[CURRENT_MODEL] || MODELS['doubao-seed-2-0-pro-260215'];
        
        const response = await fetch(modelConfig.url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: CURRENT_MODEL,
                messages: [
                    {role: 'system', content: '你是网站的AI客服助手，友好、专业地回答用户的问题。回答要简洁、有帮助。'},
                    {role: 'user', content: message}
                ],
                max_tokens: 500
            })
        });
        
        const data = await response.json();
        hideTyping();
        
        if (data.choices && data.choices[0]) {
            addMessage(data.choices[0].message.content, false);
        } else {
            addMessage('抱歉，我暂时无法回答，请稍后再试。', false);
        }
    } catch (error) {
        hideTyping();
        addMessage('网络错误，请稍后再试。', false);
        console.error(error);
    }
    
    isTyping = false;
    btn.disabled = false;
}
</script>
